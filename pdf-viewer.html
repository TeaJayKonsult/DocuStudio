<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF Viewer — DocuStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg-dark: #0A0C10;
      --bg-card: #16181D;
      --bg-card-hover: #1E2028;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.1);
      --text-primary: #F0F0F5;
      --text-secondary: #9CA3AF;
      --text-muted: #5A5E6A;
      --accent: #6366F1;
      --accent-hover: #8184F8;
      --accent-coral: #F4726B;
      --accent-teal: #14B8A6;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --workspace-bg: #F8F9FA;
      --workspace-card: #FFFFFF;
      --workspace-border: #E5E7EB;
      --workspace-text: #1A1A2E;
      --workspace-text-secondary: #4B5563;
      --workspace-text-muted: #9CA3AF;
      --workspace-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--workspace-bg);
      color: var(--workspace-text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .viewer-header h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .viewer-header .close-btn {
      background: none; border: none; color: var(--text-secondary); font-size: 24px;
      cursor: pointer; padding: 4px 12px; border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .viewer-header .close-btn:hover { color: var(--text-primary); background: var(--bg-card-hover); }
    .upload-area {
      flex-shrink: 0;
      padding: 16px 24px;
      background: var(--workspace-bg);
      border-bottom: 1px solid var(--workspace-border);
    }
    .drop-zone {
      border: 2px dashed var(--workspace-border);
      border-radius: var(--radius-md);
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--workspace-card);
      box-shadow: var(--workspace-shadow);
    }
    .drop-zone:hover { border-color: var(--accent); background: #F0F0FF; }
    .drop-zone.dragover { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .drop-zone h3 { font-size: 16px; font-weight: 600; color: var(--workspace-text); }
    .drop-zone p { font-size: 13px; color: var(--workspace-text-secondary); }
    .drop-zone .file-input { display: none; }
    .drop-zone .upload-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .drop-zone .upload-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .viewer-container {
      flex: 1;
      overflow: auto;
      padding: 20px 24px;
      background: var(--workspace-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #pdfCanvas {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      border-radius: var(--radius-sm);
      background: white;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 900px;
      background: var(--workspace-card);
      border: 1px solid var(--workspace-border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar .file-info { font-size: 13px; color: var(--workspace-text-secondary); }
    .toolbar .file-info strong { color: var(--workspace-text); }
    .toolbar .actions { display: flex; gap: 8px; }
    .toolbar .actions button {
      padding: 6px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-download { background: var(--accent); color: white; }
    .btn-download:hover { background: var(--accent-hover); }
    .btn-fill { background: var(--accent-teal); color: white; }
    .btn-fill:hover { opacity: 0.8; }
    .btn-close { background: var(--workspace-bg); color: var(--workspace-text-secondary); border: 1px solid var(--workspace-border); }
    .btn-close:hover { background: var(--workspace-border); color: var(--workspace-text); }
    .placeholder { text-align: center; padding: 60px 20px; color: var(--workspace-text-muted); }
    .placeholder .icon { font-size: 48px; margin-bottom: 12px; }
    .status {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      margin-top: 12px;
      display: none;
      font-size: 13px;
    }
    .status.success { display: block; background: rgba(20,184,166,0.12); border: 1px solid var(--accent-teal); color: #0B7A6A; }
    .status.error { display: block; background: rgba(244,114,107,0.12); border: 1px solid var(--accent-coral); color: #C0392B; }
    .status.info { display: block; background: rgba(99,102,241,0.12); border: 1px solid var(--accent); color: #4A4DBF; }
    @media (max-width: 768px) {
      .viewer-header h1 { font-size: 15px; }
      .viewer-container { padding: 12px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar .file-info { text-align: center; }
      .toolbar .actions { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="viewer-header">
  <h1>📄 PDF Viewer</h1>
  <button class="close-btn" onclick="closeViewer()">✕</button>
</div>

<div class="upload-area" id="uploadArea">
  <div class="drop-zone" id="dropZone">
    <div class="icon">📤</div>
    <h3>Upload a PDF</h3>
    <p>Drag & drop or click to browse</p>
    <input type="file" class="file-input" id="fileInput" accept=".pdf">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose PDF</button>
    <div class="status" id="uploadStatus"></div>
  </div>
</div>

<div class="viewer-container" id="viewerContainer" style="display:none;">
  <div class="toolbar" id="toolbar">
    <div class="file-info"><strong id="pdfFileName">document.pdf</strong> · <span id="pdfPageInfo">1 / 1</span></div>
    <div class="actions">
      <button class="btn-fill" id="fillBtn">✏️ Fill & Sign</button>
      <button class="btn-download" onclick="downloadPDF()">⬇️ Download</button>
      <button class="btn-close" onclick="closePDF()">Close</button>
    </div>
  </div>
  <canvas id="pdfCanvas"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDdboIxnsvdJNVNN5GnRshWu7gctzBw6b0",
    authDomain: "docustudio-1e91f.firebaseapp.com",
    projectId: "docustudio-1e91f",
    storageBucket: "docustudio-1e91f.firebasestorage.app",
    messagingSenderId: "699941699006",
    appId: "1:699941699006:web:863c41f668266de2284def",
    measurementId: "G-9CZ0RXMJCQ"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  let currentUser = null;
  let currentFile = null;
  let currentFileURL = null;
  let pdfDoc = null;
  let pageNum = 1;
  let numPages = 0;

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  auth.onAuthStateChanged((user) => {
    if (!user) {
      alert('Please sign in to use the PDF viewer.');
      window.parent.postMessage({ type: 'closeViewer' }, '*');
      return;
    }
    currentUser = user;
    db.collection('users').doc(user.uid).get().then(doc => {
      if (doc.exists) {
        const data = doc.data();
        const remaining = data.actionsRemaining || 0;
        const plan = data.plan || 'free';
        if (plan !== 'pro' && remaining <= 0) {
          document.querySelector('.upload-btn').disabled = true;
          showStatus('uploadStatus', 'error', '❌ No actions left. Upgrade to Pro.');
        }
      }
    });
  });

  function showStatus(elId, type, msg) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.className = 'status ' + type;
    el.textContent = msg;
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => { el.className = 'status'; el.textContent = ''; }, 5000);
  }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
    e.target.value = '';
  });

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
  });

  async function handleFile(file) {
    if (!currentUser) { showStatus('uploadStatus', 'error', 'Please sign in first.'); return; }
    if (file.type !== 'application/pdf') { showStatus('uploadStatus', 'error', '⚠️ Please upload a PDF.'); return; }

    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (userDoc.exists) {
      const data = userDoc.data();
      const remaining = data.actionsRemaining || 0;
      const plan = data.plan || 'free';
      if (plan !== 'pro' && remaining <= 0) {
        showStatus('uploadStatus', 'error', '❌ No actions remaining. Upgrade to Pro.');
        return;
      }
    }

    try {
      const arrayBuffer = await file.arrayBuffer();
      currentFile = file;
      currentFileURL = URL.createObjectURL(file);

      const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
      pdfDoc = await loadingTask.promise;
      numPages = pdfDoc.numPages;

      document.getElementById('pdfFileName').textContent = file.name;
      document.getElementById('pdfPageInfo').textContent = `1 / ${numPages}`;
      document.getElementById('viewerContainer').style.display = 'block';
      document.getElementById('uploadArea').style.display = 'none';

      renderPage(1);

      // Decrement action
      if (userDoc.exists && userDoc.data().plan !== 'pro') {
        const newRemaining = (userDoc.data().actionsRemaining || 0) - 1;
        await db.collection('users').doc(currentUser.uid).update({
          actionsRemaining: newRemaining
        });
      }

      await db.collection('history').add({
        userId: currentUser.uid,
        action: 'PDF Viewer',
        documentName: file.name,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      window.parent.postMessage({ type: 'actionUsed' }, '*');
      showStatus('uploadStatus', 'success', '✅ PDF loaded!');

    } catch (err) {
      showStatus('uploadStatus', 'error', '❌ ' + err.message);
    }
  }

  function renderPage(num) {
    if (!pdfDoc) return;
    pdfDoc.getPage(num).then((page) => {
      const canvas = document.getElementById('pdfCanvas');
      const ctx = canvas.getContext('2d');
      const viewport = page.getViewport({ scale: 1 });
      const containerWidth = Math.min(900, window.innerWidth - 48);
      const scale = containerWidth / viewport.width;
      const scaledViewport = page.getViewport({ scale: scale });
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      page.render({ canvasContext: ctx, viewport: scaledViewport });
      document.getElementById('pdfPageInfo').textContent = `${num} / ${numPages}`;
    });
  }

  document.addEventListener('keydown', (e) => {
    if (!pdfDoc) return;
    if (e.key === 'ArrowLeft' && pageNum > 1) { pageNum--; renderPage(pageNum); }
    else if (e.key === 'ArrowRight' && pageNum < numPages) { pageNum++; renderPage(pageNum); }
  });

  function downloadPDF() {
    if (!currentFile) return;
    const link = document.createElement('a');
    link.href = currentFileURL;
    link.download = currentFile.name;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function closePDF() {
    pdfDoc = null;
    currentFile = null;
    currentFileURL = null;
    document.getElementById('viewerContainer').style.display = 'none';
    document.getElementById('uploadArea').style.display = 'block';
    document.getElementById('uploadStatus').className = 'status';
    document.getElementById('uploadStatus').textContent = '';
    document.getElementById('fileInput').value = '';
  }

  function closeViewer() {
    window.parent.postMessage({ type: 'closeViewer' }, '*');
  }

  // Fill & Sign Button → Pass the file to the filler page
  document.getElementById('fillBtn').addEventListener('click', function() {
    if (!currentFile) return;
    // Store the file in a global variable or pass via URL
    // Since we can't pass files directly via URL, we'll store in localStorage
    try {
      // For large files, we need to be careful with localStorage limits
      // Instead, we'll open the filler page and pass the file name
      // The filler will read the file from the same storage
      localStorage.setItem('pdfToFill', JSON.stringify({
        name: currentFile.name,
        size: currentFile.size,
        type: currentFile.type,
        // We'll use the file URL or read the file again
      }));
      // Open filler page
      window.location.href = '/pdf-filler.html';
    } catch (err) {
      alert('Error opening filler: ' + err.message);
    }
  });

  window.addEventListener('resize', () => {
    if (pdfDoc) renderPage(pageNum);
  });
</script>
</body>
</html>
