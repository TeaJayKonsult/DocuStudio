<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF Filler — DocuStudio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F8F9FA;
      color: #1A1A2E;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #0A0C10;
      color: #F0F0F5;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .close-btn {
      background: none; border: none; color: #9CA3AF; font-size: 24px; cursor: pointer;
    }
    .header .close-btn:hover { color: #F0F0F5; }
    .upload-area {
      padding: 16px 24px;
      background: #F8F9FA;
      border-bottom: 1px solid #E5E7EB;
      flex-shrink: 0;
    }
    .drop-zone {
      border: 2px dashed #E5E7EB;
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
      background: #FFFFFF;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .drop-zone:hover { border-color: #6366F1; background: #F0F0FF; }
    .drop-zone .icon { font-size: 32px; }
    .drop-zone h3 { font-size: 16px; font-weight: 600; margin: 6px 0; }
    .drop-zone p { font-size: 13px; color: #4B5563; }
    .drop-zone .file-input { display: none; }
    .drop-zone .upload-btn {
      margin-top: 12px;
      padding: 8px 24px;
      background: #6366F1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .drop-zone .upload-btn:hover { background: #8184F8; }
    .tools {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .tools button {
      padding: 6px 16px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .tools button.active {
      background: #6366F1;
      color: white;
      border-color: #6366F1;
    }
    .tools button:hover { background: #F3F4F6; }
    .tools .save-btn { background: #14B8A6; color: white; border: none; }
    .tools .save-btn:hover { opacity: 0.8; }
    .tools .clear-btn { background: #F4726B; color: white; border: none; }
    .tools .clear-btn:hover { opacity: 0.8; }
    .canvas-wrapper {
      flex: 1;
      overflow: auto;
      padding: 16px 24px;
      background: #F8F9FA;
      position: relative;
    }
    #pdfCanvas {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      border-radius: 8px;
      background: white;
      cursor: crosshair;
    }
    #signatureCanvas {
      border: 2px solid #E5E7EB;
      border-radius: 8px;
      background: white;
      width: 100%;
      max-width: 400px;
      height: 200px;
      touch-action: none;
      display: none;
      margin-top: 12px;
    }
    #signatureCanvas.active { display: block; }
    .sign-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .sign-actions button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #6366F1;
      color: white;
    }
    .sign-actions button.clear { background: #E5E7EB; color: #1A1A2E; }
    .status {
      padding: 10px 16px;
      border-radius: 8px;
      margin: 8px 24px 0;
      display: none;
      font-size: 13px;
    }
    .status.success { display: block; background: rgba(20,184,166,0.12); border: 1px solid #14B8A6; color: #0B7A6A; }
    .status.error { display: block; background: rgba(244,114,107,0.12); border: 1px solid #F4726B; color: #C0392B; }
    .status.info { display: block; background: rgba(99,102,241,0.12); border: 1px solid #6366F1; color: #4A4DBF; }
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      color: #9CA3AF;
    }
    .placeholder .icon { font-size: 48px; margin-bottom: 12px; }
    @media (max-width: 600px) {
      .tools { padding: 8px 12px; gap: 4px; }
      .tools button { font-size: 12px; padding: 4px 12px; }
      .canvas-wrapper { padding: 8px 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>📄 PDF Filler</h1>
  <button class="close-btn" onclick="closeTool()">✕</button>
</div>

<div class="upload-area">
  <div class="drop-zone" id="dropZone">
    <div class="icon">📤</div>
    <h3>Upload a PDF</h3>
    <p>Tap to choose or drag & drop</p>
    <input type="file" class="file-input" id="fileInput" accept=".pdf">
    <button class="upload-btn" id="uploadBtn">Choose PDF</button>
  </div>
  <div class="status" id="uploadStatus"></div>
</div>

<div class="tools" id="toolsBar" style="display:none;">
  <button class="active" data-tool="text" onclick="setTool('text')">✏️ Text</button>
  <button data-tool="checkbox" onclick="setTool('checkbox')">☑️ Check</button>
  <button data-tool="signature" onclick="setTool('signature')">🖊️ Sign</button>
  <button class="save-btn" onclick="savePDF()">💾 Save</button>
  <button class="clear-btn" onclick="clearAll()">🗑️ Clear</button>
</div>

<div class="canvas-wrapper" id="canvasWrapper">
  <div id="placeholder">
    <div class="placeholder">
      <div class="icon">📄</div>
      <p>Upload a PDF to start filling</p>
    </div>
  </div>
  <canvas id="pdfCanvas" style="display:none;"></canvas>
  <canvas id="signatureCanvas"></canvas>
  <div class="sign-actions" id="signActions" style="display:none;">
    <button onclick="clearSignature()">Clear</button>
    <button onclick="placeSignature()">✅ Place Signature</button>
  </div>
</div>

<div class="status" id="fillStatus"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
  // ====== FIREBASE CONFIG ======
  const firebaseConfig = {
    apiKey: "AIzaSyDdboIxnsvdJNVNN5GnRshWu7gctzBw6b0",
    authDomain: "docustudio-1e91f.firebaseapp.com",
    projectId: "docustudio-1e91f",
    storageBucket: "docustudio-1e91f.firebasestorage.app",
    messagingSenderId: "699941699006",
    appId: "1:699941699006:web:863c41f668266de2284def",
    measurementId: "G-9CZ0RXMJCQ"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  auth.onAuthStateChanged(user => {
    if (user) currentUser = user;
    else { alert('Please sign in'); window.parent.postMessage({ type: 'closeViewer' }, '*'); }
  });

  // ====== STATE ======
  let pdfDoc = null;
  let pageNum = 1;
  let annotations = [];
  let currentTool = 'text';
  let signatureImage = null;
  let currentFile = null;
  let currentData = null;

  // ====== DOM REFS ======
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const dropZone = document.getElementById('dropZone');
  const uploadStatus = document.getElementById('uploadStatus');
  const fillStatus = document.getElementById('fillStatus');
  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');
  const sigCanvas = document.getElementById('signatureCanvas');
  const sigCtx = sigCanvas.getContext('2d');
  const toolsBar = document.getElementById('toolsBar');

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ====== SHOW STATUS ======
  function showStatus(el, type, msg) {
    if (!el) return;
    el.className = 'status ' + type;
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  // ====== UPLOAD ======
  async function handleFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
      showStatus(uploadStatus, 'error', 'Please select a PDF file.');
      return;
    }
    if (!currentUser) { showStatus(uploadStatus, 'error', 'Sign in first.'); return; }

    try {
      const arrayBuffer = await file.arrayBuffer();
      currentFile = file;
      currentData = arrayBuffer;

      const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
      pdfDoc = await loadingTask.promise;
      pageNum = 1;

      // Render first page
      const page = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: 1 });
      const containerWidth = Math.min(800, window.innerWidth - 48);
      const scale = containerWidth / viewport.width;
      const scaledViewport = page.getViewport({ scale: scale });
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;

      // Show canvas, hide placeholder
      canvas.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      toolsBar.style.display = 'flex';
      showStatus(uploadStatus, 'success', '✅ PDF loaded. Tap to add text, checkboxes, or signature.');
      showStatus(fillStatus, 'info', '🟢 Click on the PDF to add content.');
    } catch (err) {
      showStatus(uploadStatus, 'error', '❌ ' + err.message);
    }
  }

  // ====== EVENT LISTENERS ======
  uploadBtn.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', (e) => {
    if (e.target.classList.contains('upload-btn')) return;
    fileInput.click();
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) handleFile(e.target.files[0]);
    e.target.value = '';
  });

  // Drag & drop (optional, but good)
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#6366F1'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#E5E7EB'; });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = '#E5E7EB';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  // ====== TOOL SELECTION ======
  window.setTool = function(tool) {
    currentTool = tool;
    document.querySelectorAll('.tools button[data-tool]').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tools button[data-tool="${tool}"]`).classList.add('active');
    if (tool === 'signature') {
      sigCanvas.classList.add('active');
      document.getElementById('signActions').style.display = 'flex';
    } else {
      sigCanvas.classList.remove('active');
      document.getElementById('signActions').style.display = 'none';
    }
  };

  // ====== CLICK ON CANVAS ======
  canvas.addEventListener('click', function(e) {
    if (!pdfDoc) { showStatus(fillStatus, 'error', 'Upload a PDF first.'); return; }
    const rect = this.getBoundingClientRect();
    const scaleX = this.width / rect.width;
    const scaleY = this.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (currentTool === 'text') {
      const text = prompt('Enter text:', '');
      if (text && text.trim() !== '') {
        annotations.push({ page: pageNum, x, y, type: 'text', text: text.trim(), color: '#000000', size: 14 });
        renderPage(pageNum);
        showStatus(fillStatus, 'success', '✅ Text added.');
      }
    } else if (currentTool === 'checkbox') {
      annotations.push({ page: pageNum, x, y, type: 'checkbox' });
      renderPage(pageNum);
      showStatus(fillStatus, 'success', '✅ Checkmark added.');
    } else if (currentTool === 'signature') {
      if (signatureImage) {
        annotations.push({ page: pageNum, x, y, type: 'signature', imageData: signatureImage });
        renderPage(pageNum);
        showStatus(fillStatus, 'success', '✅ Signature placed.');
      } else {
        showStatus(fillStatus, 'error', '❌ Draw a signature first.');
      }
    }
  });

  // ====== RENDER ======
  function renderPage(page) {
    if (!pdfDoc) return;
    pdfDoc.getPage(page).then(function(pageObj) {
      const viewport = pageObj.getViewport({ scale: 1 });
      const containerWidth = Math.min(800, window.innerWidth - 48);
      const scale = containerWidth / viewport.width;
      const scaledViewport = pageObj.getViewport({ scale: scale });
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      pageObj.render({ canvasContext: ctx, viewport: scaledViewport }).then(() => {
        // Draw annotations
        const pageAnnots = annotations.filter(a => a.page === page);
        pageAnnots.forEach(a => {
          if (a.type === 'text') {
            ctx.font = (a.size || 14) + 'px Inter, sans-serif';
            ctx.fillStyle = a.color || '#000000';
            ctx.fillText(a.text, a.x, a.y);
          } else if (a.type === 'checkbox') {
            ctx.font = '24px Inter, sans-serif';
            ctx.fillStyle = '#000000';
            ctx.fillText('✓', a.x - 10, a.y + 8);
          } else if (a.type === 'signature' && a.imageData) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, a.x - 50, a.y - 20, 100, 40);
            img.src = a.imageData;
          }
        });
      });
    });
  }

  // ====== SIGNATURE CANVAS ======
  (function setupSig() {
    sigCanvas.width = 400;
    sigCanvas.height = 200;
    sigCtx.fillStyle = 'white';
    sigCtx.fillRect(0, 0, 400, 200);
    sigCtx.strokeStyle = '#1A1A2E';
    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    let drawing = false, lastX, lastY;
    function getPos(e) {
      const rect = sigCanvas.getBoundingClientRect();
      const scaleX = sigCanvas.width / rect.width;
      const scaleY = sigCanvas.height / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }
    function start(e) { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; }
    function draw(e) { e.preventDefault(); if (!drawing) return; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(lastX, lastY); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); lastX = p.x; lastY = p.y; }
    function end(e) { e.preventDefault(); drawing = false; signatureImage = sigCanvas.toDataURL('image/png'); }
    sigCanvas.addEventListener('mousedown', start);
    sigCanvas.addEventListener('mousemove', draw);
    sigCanvas.addEventListener('mouseup', end);
    sigCanvas.addEventListener('mouseleave', end);
    sigCanvas.addEventListener('touchstart', start, { passive: false });
    sigCanvas.addEventListener('touchmove', draw, { passive: false });
    sigCanvas.addEventListener('touchend', end, { passive: false });
  })();

  window.clearSignature = function() {
    sigCtx.fillStyle = 'white';
    sigCtx.fillRect(0, 0, 400, 200);
    signatureImage = null;
    showStatus(fillStatus, 'info', '🧹 Signature cleared.');
  };
  window.placeSignature = function() {
    showStatus(fillStatus, 'info', '🖊️ Click on the PDF to place your signature.');
  };

  // ====== SAVE PDF ======
  window.savePDF = async function() {
    if (!currentData) { showStatus(fillStatus, 'error', 'Upload a PDF first.'); return; }
    if (annotations.length === 0) { showStatus(fillStatus, 'error', 'No annotations to save.'); return; }

    try {
      const pdfLib = PDFLib;
      const pdfDocLib = await pdfLib.PDFDocument.load(currentData);
      const pages = pdfDocLib.getPages();

      const annotsByPage = {};
      annotations.forEach(a => {
        if (!annotsByPage[a.page]) annotsByPage[a.page] = [];
        annotsByPage[a.page].push(a);
      });

      for (const [pageNum, annots] of Object.entries(annotsByPage)) {
        const pageIndex = parseInt(pageNum) - 1;
        if (pageIndex >= pages.length) continue;
        const page = pages[pageIndex];
        const { width, height } = page.getSize();
        const scaleFactor = width / canvas.width;

        annots.forEach(a => {
          const pdfX = a.x * scaleFactor;
          const pdfY = height - (a.y * scaleFactor);

          if (a.type === 'text') {
            page.drawText(a.text, {
              x: pdfX,
              y: pdfY,
              size: (a.size || 14) * scaleFactor,
              color: pdfLib.rgb(0, 0, 0),
            });
          } else if (a.type === 'checkbox') {
            page.drawText('✓', {
              x: pdfX - 8 * scaleFactor,
              y: pdfY + 4 * scaleFactor,
              size: 24 * scaleFactor,
              color: pdfLib.rgb(0, 0, 0),
            });
          } else if (a.type === 'signature' && a.imageData) {
            const pngImage = await pdfLib.embedPng(a.imageData);
            page.drawImage(pngImage, {
              x: pdfX - 40 * scaleFactor,
              y: pdfY - 10 * scaleFactor,
              width: 80 * scaleFactor,
              height: 30 * scaleFactor,
            });
          }
        });
      }

      const pdfBytes = await pdfDocLib.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'filled.pdf';
      link.click();
      URL.revokeObjectURL(url);

      showStatus(fillStatus, 'success', '✅ Filled PDF downloaded!');
    } catch (err) {
      showStatus(fillStatus, 'error', '❌ ' + err.message);
    }
  };

  // ====== CLEAR ALL ======
  window.clearAll = function() {
    if (annotations.length === 0) return;
    if (!confirm('Clear all annotations?')) return;
    annotations = [];
    renderPage(pageNum);
    showStatus(fillStatus, 'success', '✅ All annotations cleared.');
  };

  // ====== CLOSE ======
  window.closeTool = function() {
    window.parent.postMessage({ type: 'closeViewer' }, '*');
  };
</script>
</body>
</html>
